# SHIRO FRAME // 4KMPV
# Interfaz inspirada directamente en el sistema visual de Shiro Labs.
# Este archivo solo configura la interfaz. Los perfiles Anime4K siguen en input.conf.

# Barra de reproducción amplia y precisa, con controles legibles.
timeline_style=bar
timeline_size=38
timeline_line_width=6
timeline_border=0
timeline_step=5
timeline_cache=yes

# Una sola línea funcional: archivo, transporte, biblioteca, Anime4K y ajustes.
# El botón de estrellas abre el acceso rápido a los perfiles existentes.
controls=menu,open-file,gap,prev,play-pause,next,items,gap,button:anime4k,space,<video,audio>speed,<video,audio>subtitles,<has_many_audio>audio,<has_many_video>video,<stream>stream-quality,gap,button:portable-tools,loop-file,fullscreen
controls_size=32
controls_margin=8
controls_spacing=2

# Menús cómodos para mouse y pantallas de alta resolución.
menu_item_height=38
menu_min_width=340
menu_padding=4
menu_type_to_search=yes
languages=es,en

# Barra de título discreta; aparece al acercar el cursor.
top_bar=no-border
top_bar_size=40
top_bar_controls=right
top_bar_title=yes
top_bar_alt_title=SHIRO LABS // 4KMPV
top_bar_alt_title_place=below
top_bar_flash_on=video,audio

# Área de volumen vertical al borde derecho.
volume=right
volume_size=38
volume_step=2

# Escalado y respuesta visual equilibrados.
scale=1
scale_fullscreen=1.08
font_scale=1
font_bold=yes
text_border=0.8
border_radius=2
animation_duration=100
flash_duration=1000
proximity_in=42
proximity_out=125

# Paleta oficial: blanco, negro y grises. Cyan reservado para señal interactiva.
# Rojo y naranja quedan exclusivamente para errores y advertencias.
color=foreground=16181c,foreground_text=ffffff,background=f4f4f4,background_text=16181c,curtain=08090b,accent=35c9d8,idle=d9d9d9,success=4caf50,error=e60000,match=35c9d8,heatmap=35c9d8
opacity=timeline=1,position=1,controls=0.92,menu=0.98,submenu=0.82,border=0.55,title=0.96,tooltip=0.96,curtain=0.90,idle_indicator=0.82,buffering_indicator=0.40

# Indicadores útiles sin ocultar el video.
progress=windowed
progress_size=4
pause_indicator=flash
destination_time=playtime-remaining
time_precision=0
adjust_osd_margins=yes
