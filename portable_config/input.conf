# ==========================================
# MENÚ NATIVO DE UOSC
# ==========================================
menu        script-binding uosc/menu
mbtn_right  script-binding uosc/menu
s           script-binding uosc/subtitles          #! Pistas > Subtítulos
a           script-binding uosc/audio              #! Pistas > Audio
q           script-binding uosc/stream-quality     #! Reproducción > Calidad de emisión
p           script-binding uosc/items              #! Reproducción > Lista y archivos
c           script-binding uosc/chapters           #! Reproducción > Capítulos
>           script-binding uosc/next               #! Navegación > Siguiente
<           script-binding uosc/prev               #! Navegación > Anterior
o           script-binding uosc/open-file          #! Archivo > Abrir
ctrl+c      script-binding uosc/copy-to-clipboard  #! Archivo > Copiar ruta o URL
O           script-binding uosc/show-in-directory  #! Archivo > Mostrar en carpeta
d           script-binding portable-tools/menu     #! Herramientas > Centro portable
esc         quit                                   #! Salir

# ==========================================
# MENÚ DE ANIME4K
# ==========================================
# Las cadenas originales viven en anime4k-manager.lua para mantener una sola fuente.
ctrl+1 script-message-to anime4k_manager set A       #! Anime4K > Modo A (1080p)
ctrl+2 script-message-to anime4k_manager set B       #! Anime4K > Modo B (720p)
ctrl+3 script-message-to anime4k_manager set AA      #! Anime4K > Modo AA (máxima calidad)
ctrl+4 script-message-to anime4k_manager set LITE    #! Anime4K > Modo ligero
ctrl+9 script-message-to anime4k_manager toggle-auto #! Anime4K > Modo automático
ctrl+0 script-message-to anime4k_manager set OFF     #! Anime4K > Desactivar
