alang=jpn,jp,eng,en,spa,es
slang=spa,es,eng,en

# Estado, historial y caches: todo permanece dentro de portable_config.
save-position-on-quit=yes
save-watch-history=yes
write-filename-in-watch-later-config=yes
watch-later-dir=~~/state/watch_later
watch-history-path=~~/state/watch_history.jsonl
gpu-shader-cache-dir=~~/cache
icc-cache-dir=~~/cache
demuxer-cache-dir=~~/cache
screenshot-dir=~~/screenshots

# Comportamiento de reproductor de escritorio.
keep-open=yes
keep-open-pause=no
force-window=immediate
cursor-autohide=1000
osd-on-seek=msg-bar
